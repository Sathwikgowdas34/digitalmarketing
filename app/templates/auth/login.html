{% extends "base.html" %}

{% block title %}Login - CreatorHub{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-500 to-purple-600 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-center text-gray-600 mb-8">Login to your CreatorHub account</p>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="your@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="w-4 h-4">
                    <span class="ml-2 text-sm text-gray-700">Remember me</span>
                </label>
                <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-purple-600 hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 smooth-transition">
                Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-purple-600 font-bold hover:underline">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
