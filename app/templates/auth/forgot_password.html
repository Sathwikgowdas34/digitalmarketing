{% extends "base.html" %}

{% block title %}Forgot Password - CreatorHub{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-500 to-purple-600 flex items-center justify-center py-12 px-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">Reset Password</h1>
        <p class="text-center text-gray-600 mb-8">Enter your email to receive a password reset link</p>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="your@email.com">
            </div>

            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700 smooth-transition">
                Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600">Remember your password? <a href="{{ url_for('auth.login') }}" class="text-purple-600 font-bold hover:underline">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
